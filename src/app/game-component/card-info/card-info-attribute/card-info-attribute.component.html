<span class="value"
      [class.lower]="isNumber() && correctCard() && answerLower()"
      [class.higher]="isNumber() && correctCard() && answerHigher()"
      [class.correct]="correctCard() && card()[field()] == correctCard()?.[field()]">{{ displayValue() }}</span>
<span class="text-muted"> {{name()}}</span>
